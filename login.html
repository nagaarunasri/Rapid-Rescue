<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Rapid Rescue AI</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <!-- AOS Animation -->
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  <!-- Animate.css -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Custom Styles -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="gradient-bg">

  <!-- Animated particle background -->
  <div id="particles" style="position:fixed; inset:0; overflow:hidden; pointer-events:none; z-index:0;"></div>

  <div class="auth-wrapper py-4">
    <div class="container">
      <div class="row glass-card g-0 overflow-hidden mx-auto" style="max-width: 950px;" data-aos="zoom-in">

        <!-- LEFT: Illustration -->
        <div class="col-md-5 auth-illustration">
          <div class="float-anim mb-4">
            <i class="fa-solid fa-truck-medical" style="font-size: 5rem; color:#fff;"></i>
          </div>
          <h2 class="fw-bold text-white">
            <i class="fa-solid fa-staff-snake me-2"></i>Rapid Rescue AI
          </h2>
          <p class="text-light mt-3 mb-0">Smart Roads. Faster Response. Saving Lives.</p>
          <div class="mt-4 d-flex align-items-center gap-2">
            <i class="fa-solid fa-heart-pulse" style="font-size:1.8rem; color:#DC3545; animation: heartbeat 1.4s infinite;"></i>
            <small class="text-light">Real-time ambulance route guidance system</small>
          </div>
        </div>

        <!-- RIGHT: Login Form -->
        <div class="col-md-7 auth-form-side">
          <h3 class="fw-bold mb-1">Welcome Back</h3>
          <p class="text-light mb-4">Sign in to access your dashboard</p>

          <div id="loginError" class="alert alert-danger d-none" role="alert"></div>

          <form id="loginForm" novalidate>
            <div class="mb-3">
              <label class="form-label">Email Address</label>
              <div class="input-group">
                <span class="input-group-text bg-transparent text-white border-0 form-control-glass"><i class="fa-solid fa-envelope"></i></span>
                <input type="email" id="loginEmail" class="form-control form-control-glass" placeholder="you@example.com" required>
              </div>
            </div>

            <div class="mb-2">
              <label class="form-label">Password</label>
              <div class="input-group">
                <span class="input-group-text bg-transparent text-white border-0 form-control-glass"><i class="fa-solid fa-lock"></i></span>
                <input type="password" id="loginPassword" class="form-control form-control-glass" placeholder="••••••••" required minlength="6">
                <span class="input-group-text bg-transparent text-white border-0 form-control-glass" style="cursor:pointer;">
                  <i id="togglePassword" class="fa-solid fa-eye"></i>
                </span>
              </div>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-3">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="rememberMe">
                <label class="form-check-label small" for="rememberMe">Remember Me</label>
              </div>
              <a href="#" id="forgotPassword" class="small text-info">Forgot Password?</a>
            </div>

            <button type="submit" id="loginBtn" class="btn btn-primary-glow w-100 mb-3">
              <i class="fa-solid fa-right-to-bracket me-2"></i>Sign In
            </button>

            <div class="text-center text-light mb-3">— or continue with —</div>

            <button type="button" id="googleSignIn" class="btn btn-outline-glow w-100 mb-3">
              <i class="fa-brands fa-google me-2"></i>Sign in with Google
            </button>

            <p class="text-center text-light mb-0">
              Don't have an account? <a href="register.html" class="text-info fw-semibold">Create one</a>
            </p>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- AOS -->
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

  <!-- App Scripts -->
  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
