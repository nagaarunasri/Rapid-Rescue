<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | Rapid Rescue AI</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="gradient-bg">

  <div id="particles" style="position:fixed; inset:0; overflow:hidden; pointer-events:none; z-index:0;"></div>

  <div class="auth-wrapper py-4">
    <div class="container">
      <div class="row glass-card g-0 overflow-hidden mx-auto" style="max-width: 950px;" data-aos="zoom-in">

        <!-- LEFT: Illustration -->
        <div class="col-md-5 auth-illustration">
          <div class="float-anim mb-4">
            <i class="fa-solid fa-truck-medical" style="font-size: 5rem; color:#fff;"></i>
          </div>
          <h2 class="fw-bold text-white">
            <i class="fa-solid fa-staff-snake me-2"></i>Rapid Rescue AI
          </h2>
          <p class="text-light mt-3 mb-0">Smart Roads. Faster Response. Saving Lives.</p>
          <div class="mt-4 d-flex align-items-center gap-2">
            <i class="fa-solid fa-heart-pulse" style="font-size:1.8rem; color:#DC3545; animation: heartbeat 1.4s infinite;"></i>
            <small class="text-light">Join the smart emergency response network</small>
          </div>
        </div>

        <!-- RIGHT: Register Form -->
        <div class="col-md-7 auth-form-side">
          <h3 class="fw-bold mb-1">Create Account</h3>
          <p class="text-light mb-4">Register to access Rapid Rescue AI dashboard</p>

          <div id="registerError" class="alert alert-danger d-none" role="alert"></div>

          <form id="registerForm" novalidate>
            <div class="mb-3">
              <label class="form-label">Full Name</label>
              <div class="input-group">
                <span class="input-group-text bg-transparent text-white border-0 form-control-glass"><i class="fa-solid fa-user"></i></span>
                <input type="text" id="regName" class="form-control form-control-glass" placeholder="John Doe" required>
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label">Email Address</label>
              <div class="input-group">
                <span class="input-group-text bg-transparent text-white border-0 form-control-glass"><i class="fa-solid fa-envelope"></i></span>
                <input type="email" id="regEmail" class="form-control form-control-glass" placeholder="you@example.com" required>
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label">Password</label>
              <div class="input-group">
                <span class="input-group-text bg-transparent text-white border-0 form-control-glass"><i class="fa-solid fa-lock"></i></span>
                <input type="password" id="regPassword" class="form-control form-control-glass" placeholder="Minimum 6 characters" required minlength="6">
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label">Confirm Password</label>
              <div class="input-group">
                <span class="input-group-text bg-transparent text-white border-0 form-control-glass"><i class="fa-solid fa-lock"></i></span>
                <input type="password" id="regConfirmPassword" class="form-control form-control-glass" placeholder="Re-enter password" required minlength="6">
              </div>
            </div>

            <button type="submit" id="registerBtn" class="btn btn-primary-glow w-100 mb-3">
              <i class="fa-solid fa-user-plus me-2"></i>Create Account
            </button>

            <p class="text-center text-light mb-0">
              Already have an account? <a href="login.html" class="text-info fw-semibold">Sign In</a>
            </p>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
